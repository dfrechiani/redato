      Além disso, as redes sociais consolidaram uma cultura da comparação permanente. Além disso, plataformas como Instagram e TikTok priorizam conteúdos estéticos e performáticos. Corpos editados, rotinas idealizadas e conquistas exibidas tornam-se parâmetro de normalidade nessas plataformas. Adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de curtidas. Isso é um fenômeno que o sociólogo Zygmunt Bauman classificou como "modernidade líquida". Além disso, pesquisas da OMS apontam crescimento expressivo de quadros de ansiedade e depressão entre jovens. Aquilo coincide com a popularização dessas mídias.

