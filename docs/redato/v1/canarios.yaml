  - id: c3_with_strong_repertoire
    function: "Detecta confusão entre C2 e C3. Texto com 8 referências legítimas mas sem projeto de texto."
    bias_detected: "Inflação de C3 por presença de repertório denso; incapacidade de distinguir 'muitas referências' de 'argumentação organizada'."
