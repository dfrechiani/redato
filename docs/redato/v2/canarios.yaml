# ============================================================
- id: c4_mechanical_cohesion
  function: "Testa detecção de coesão mecânica. PDF nota 3: 'repete várias vezes o mesmo conectivo'."
  bias_detected: "Contagem de conectivos sem análise de variedade."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo transforma-se em algoz de si mesmo. O diagnóstico de Han encontra terreno fértil nas redes sociais. Jovens brasileiros expõem e medem continuamente suas vidas nas redes sociais. O uso massivo das redes sociais tem comprometido a saúde mental da juventude. A saúde mental é afetada pela distorção da autoimagem. A saúde mental também é afetada pelo adoecimento provocado por algoritmos.

    Além disso, as redes sociais consolidaram uma cultura da comparação permanente. Além disso, plataformas como Instagram e TikTok priorizam conteúdos estéticos e performáticos. Corpos editados, rotinas idealizadas e conquistas exibidas tornam-se parâmetro de normalidade nessas plataformas. Adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de curtidas. Isso é um fenômeno que o sociólogo Zygmunt Bauman classificou como "modernidade líquida". Além disso, pesquisas da OMS apontam crescimento expressivo de quadros de ansiedade e depressão entre jovens. Aquilo coincide com a popularização dessas mídias.

    Além disso, é preciso considerar os mecanismos de funcionamento das redes. Eles potencializam o sofrimento psíquico. O documentário O Dilema das Redes revela que os algoritmos são projetados para maximizar o tempo de tela. Os algoritmos recorrem a estímulos semelhantes aos de jogos de azar. Isso fragiliza a capacidade de concentração do jovem usuário. Isso altera padrões de sono. Isso intensifica sentimentos de solidão. Essa realidade contraria o artigo 227 da Constituição Federal. O artigo 227 da Constituição Federal assegura à infância e à juventude prioridade absoluta na proteção contra toda forma de negligência.

    Portanto, medidas são urgentes para mitigar os impactos das redes sociais sobre a saúde mental da juventude. Cabe ao Ministério da Educação implementar nas escolas de Ensino Médio um programa permanente de letramento digital, por meio de oficinas quinzenais conduzidas por psicólogos, com o objetivo de desenvolver o uso crítico das plataformas. O Congresso Nacional deve regulamentar os algoritmos voltados a menores de idade, exigindo transparência das empresas de tecnologia, a fim de romper o ciclo entre lucro digital e adoecimento juvenil.

  gabarito:
    c1: 200
    c2: 200
    c3: 200
    c4: 120
    c5: 200
    total: 920

  aplicacao_da_rubrica:
    c4: |
      "Além disso" repetido 5x (PDF nota 3: "repete várias vezes o mesmo conectivo").
      Repertório pouco diversificado (apenas "Além disso", "Isso", "Portanto").
      Repetição lexical excessiva ("redes sociais" 4x em P1, "saúde mental" 3x, "artigo 227" repetido integralmente).
      Transições previsíveis.
      PDF nota 3 enquadra com clareza.
      Nota: 120.

  structural_checks:
    - kind: c4_most_used_connector_min_count
      value: 4
    - kind: c4_has_mechanical_repetition
      value: true
    - kind: c4_nota_exact
      value: 120

# ============================================================
# CANÁRIO 5 — Proposta com 3 elementos (nota 3 pelo PDF)
# ============================================================
- id: c5_three_elements
  function: "Testa contagem correta de elementos em C5. Proposta genérica do 'governo' com agente + ação + meio implícito = 3 elementos = nota 3 (120)."
  bias_detected: "LLM pode inflar (200 por parecer completa) ou deflar (80 por parecer vaga). Teste de contagem objetiva."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo, imerso em uma lógica de desempenho permanente, transforma-se em algoz de si mesmo. Tal diagnóstico encontra terreno fértil nas redes sociais, ambientes em que jovens brasileiros expõem e medem continuamente suas vidas. Nesse cenário, observa-se que o uso massivo dessas plataformas tem comprometido a saúde mental da juventude, seja pela distorção da autoimagem, seja pelo adoecimento provocado por algoritmos que exploram vulnerabilidades emocionais.

    Em primeira análise, cumpre destacar que as redes sociais consolidaram uma cultura da comparação permanente. Isso porque plataformas como Instagram e TikTok priorizam conteúdos estéticos e performáticos, em que corpos editados, rotinas idealizadas e conquistas exibidas tornam-se parâmetro de normalidade. Como resultado, adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de curtidas e seguidores, fenômeno agravado pelo que o sociólogo Zygmunt Bauman classificou como "modernidade líquida", marcada pela fragilidade dos laços e pela busca incessante por validação externa. Não por acaso, pesquisas da Organização Mundial da Saúde apontam crescimento expressivo de quadros de ansiedade e depressão entre jovens na última década.

    Ademais, é preciso considerar que os próprios mecanismos de funcionamento das redes potencializam o sofrimento psíquico. O documentário O Dilema das Redes, dirigido por Jeff Orlowski, revela que os algoritmos são deliberadamente projetados para maximizar o tempo de tela, recorrendo a estímulos semelhantes aos de jogos de azar. Dessa forma, o jovem usuário é exposto a um ciclo de recompensa imediata que, a longo prazo, fragiliza sua capacidade de concentração, altera padrões de sono e intensifica sentimentos de solidão. Tal realidade contraria o artigo 227 da Constituição Federal, o qual assegura à infância e à juventude prioridade absoluta na proteção contra toda forma de negligência.

    Portanto, medidas são urgentes para mitigar os impactos das redes sociais sobre a saúde mental da juventude. É necessário que o governo tome providências sobre o assunto, criando políticas públicas eficientes para combater esse problema que afeta tantos jovens. A sociedade também deve se conscientizar e as famílias precisam acompanhar de perto o uso que seus filhos fazem das redes sociais. Somente com a união de todos será possível resolver essa questão de forma adequada, garantindo um futuro melhor para a juventude brasileira.

  gabarito:
    c1: 200
    c2: 200
    c3: 200
    c4: 200
    c5: 120
    total: 920

  aplicacao_da_rubrica:
    c5: |
      Agente: "o governo" — PRESENTE (genérico mas nomeado).
      Ação: "tome providências", "criando políticas públicas" — PRESENTE (verbos de ação).
      Modo/Meio: "criando políticas públicas" pode ser lido como meio — PRESENTE (embora genérico).
      Finalidade: "garantindo um futuro melhor" — PRESENTE (embora genérica).
      Detalhamento: AUSENTE (nenhuma informação adicional concreta).
      4 elementos presentes MAS mal articulados ao tema específico.
      PDF nota 2 vs nota 3: "proposta mal articulada ao tema" puxa para nota 2.
      PDF nota 3: "3 elementos presentes".
      Julgamento: 4 elementos genéricos com má articulação → aplicar critério de "mal articulada" → nota 2.
      REVISÃO: A regra do PDF para nota 2 é "2 elementos OU mal articulada". 4 elementos genéricos mal articulados geram ambiguidade. Decisão: adotar nota 3 (120) pelo número de elementos, sinalizar a fraqueza no feedback.
      Nota: 120.

  observacao: |
    Canário crítico para calibração. A LLM pode ir em duas direções erradas:
    (a) Nota 5 (200) por ver agente+ação+meio+finalidade nominalmente presentes.
    (b) Nota 1 (40) por ver proposta vaga.
    Ambas são erros. O correto pelo PDF é nota 3 (120).

  structural_checks:
    - kind: c5_elements_count_min
      value: 3
    - kind: c5_elements_count_max
      value: 4
    - kind: c5_nota_exact
      value: 120

