  bias_detected: "Criticismo obrigatório."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo, imerso em uma lógica de desempenho permanente, transforma-se em algoz de si mesmo. Tal diagnóstico encontra terreno fértil nas redes sociais, ambientes em que jovens brasileiros expõem e medem continuamente suas vidas. Nesse cenário, observa-se que o uso massivo dessas plataformas tem comprometido a saúde mental da juventude, seja pela distorção da autoimagem, seja pelo adoecimento provocado por algoritmos que exploram vulnerabilidades emocionais.

    Em primeira análise, cumpre destacar que as redes sociais consolidaram uma cultura da comparação permanente. Isso porque plataformas como Instagram e TikTok priorizam conteúdos estéticos e performáticos, em que corpos editados, rotinas idealizadas e conquistas exibidas tornam-se parâmetro de normalidade. Como resultado, adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de curtidas e seguidores, fenômeno agravado pelo que o sociólogo Zygmunt Bauman classificou como "modernidade líquida", marcada pela fragilidade dos laços e pela busca incessante por validação externa. Não por acaso, pesquisas da Organização Mundial da Saúde apontam crescimento expressivo de quadros de ansiedade e depressão entre jovens na última década, coincidindo com a popularização dessas mídias.

    Ademais, é preciso considerar que os próprios mecanismos de funcionamento das redes potencializam o sofrimento psíquico. O documentário O Dilema das Redes, dirigido por Jeff Orlowski, revela que os algoritmos são deliberadamente projetados para maximizar o tempo de tela, recorrendo a estímulos semelhantes aos de jogos de azar. Dessa forma, o jovem usuário é exposto a um ciclo de recompensa imediata que, a longo prazo, fragiliza sua capacidade de concentração, altera padrões de sono e intensifica sentimentos de solidão. Tal realidade contraria o artigo 227 da Constituição Federal, o qual assegura à infância e à juventude prioridade absoluta na proteção contra toda forma de negligência, incluindo aquelas de natureza psicológica.

    Portanto, medidas são urgentes para mitigar os impactos das redes sociais sobre a saúde mental da juventude. Cabe ao Ministério da Educação, em parceria com as secretarias estaduais de ensino, implementar, nas escolas de Ensino Médio, um programa permanente de letramento digital e emocional, por meio de oficinas quinzenais conduzidas por psicólogos e professores capacitados, com o objetivo de desenvolver o uso crítico das plataformas e fortalecer o bem-estar psíquico dos estudantes. Complementarmente, o Congresso Nacional deve regulamentar os algoritmos voltados a menores de idade, exigindo transparência das empresas de tecnologia, a fim de romper o ciclo entre lucro digital e adoecimento juvenil.

  gabarito:
