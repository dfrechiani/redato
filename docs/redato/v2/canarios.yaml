# ============================================================
# CANÁRIO 11 — Cópia excessiva de motivadores (quase anulação)
# ============================================================
- id: c2_heavy_copy
  function: "Testa checagem de cópia. Texto com muitos trechos copiados e menos de 8 linhas próprias deve ser anulado; com mais de 8 linhas próprias mas cópia predominante, C2 nota 2."
  bias_detected: "LLM pode ignorar cópia ou não distinguir produção própria."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Segundo o texto motivador 1, "o uso excessivo de redes sociais tem sido associado ao aumento de quadros de ansiedade e depressão entre adolescentes". Ainda conforme o mesmo texto, "os algoritmos dessas plataformas são projetados para maximizar o engajamento, recorrendo a estímulos semelhantes aos de jogos de azar". O texto motivador 2 afirma que "jovens expostos a conteúdos idealizados desenvolvem distorções de autoimagem com mais frequência do que adultos".

    Os dados apresentados no texto motivador 3 mostram que "80% dos adolescentes brasileiros passam mais de quatro horas por dia em redes sociais". Conforme ainda o texto 3, "esse tempo de exposição é associado a fragilização cognitiva e alterações de padrões de sono". O texto 4 traz que "a Constituição Federal, em seu artigo 227, assegura à infância e à juventude prioridade absoluta na proteção contra toda forma de negligência, incluindo aquelas de natureza psicológica".

    Diante disso, as redes sociais comprometem a saúde mental dos jovens. É um problema sério que precisa de atenção.

    Portanto, o governo deve agir para resolver essa questão.

  gabarito:
    c1: 120
    c2: 80
    c3: 80
    c4: 120
    c5: 40
    total: 440

  aplicacao_da_rubrica:
    preanulacao: |
      Contagem de linhas próprias: aproximadamente 4-5 linhas (o resto é cópia entre aspas).
      NÃO anula (está entre 8 linhas é o limite; aqui depende do formato manuscrito).
      Se manuscrita com menos de 8 linhas próprias, ANULA.
      Assumindo que são ~6 linhas próprias, mantém-se avaliação mas com forte penalidade.
    c2: |
      PDF nota 2: "necessariamente abordagem completa do tema, mas problemas relacionados ao tipo textual e presença de muitos trechos de cópia sem aspas".
      Aqui as cópias TÊM aspas (não é plágio) mas DOMINAM o texto.
      Cópia excessiva mesmo com aspas indica ausência de produção própria.
      Nota: 80.
    c5: |
      "o governo deve agir" — apenas agente + ação genérica = 2 elementos? ou 1?
      "agir" é verbo de ação mínimo, mas sem objeto claro.
      Leitura estrita: 1 elemento (agente + ação como bloco mínimo).
      Leitura generosa: 2 elementos.
      Nota: 40 (leitura estrita, proposta vaga e precária).

  observacao: |
    Canário complexo. Testa duas coisas: (1) contagem de produção própria vs. cópia; (2) aplicação do PDF em caso-limite. Se a LLM ANULAR a redação, tudo bem — é uma resposta válida se interpretar que há menos de 8 linhas próprias. Se não anular, o gabarito acima aplica.

  # Este canário aceita DOIS comportamentos como válidos:
  # (a) Anulação por <8 linhas próprias (should_annul=true, todas em 0);
  # (b) Manter avaliação com C2 baixo (c2_nota_max=120).
  # Portanto a checagem estrutural principal é "ou anulou OU C2 penalizado".
  # O drift numérico (±40) não se aplica aqui — colocamos tolerance_override.
  tolerance_override:
    per_competency: 200  # efetivamente desabilita o drift check para este canário
  structural_checks: []
