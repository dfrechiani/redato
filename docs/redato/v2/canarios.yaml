- id: c2_tangenciamento
  function: "Testa detecção de tangenciamento pela ausência de palavras-chave do tema."
  bias_detected: "LLM pode aceitar argumentação pertinente mesmo sem as palavras do tema propriamente ditas."
  essay: |
    Tecnologia e o ser humano moderno

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo, imerso em uma lógica de desempenho permanente, transforma-se em algoz de si mesmo. A tecnologia contemporânea amplifica essa tendência de múltiplas formas, afetando especialmente as novas gerações em sua construção identitária e em sua relação com o mundo.

    Em primeira análise, a tecnologia consolidou uma cultura da comparação permanente. Isso porque os ambientes digitais priorizam conteúdos estéticos e performáticos, em que corpos editados e rotinas idealizadas tornam-se parâmetro de normalidade. Como resultado, os adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de validação alheia, fenômeno agravado pelo que Zygmunt Bauman classificou como "modernidade líquida".

    Ademais, os mecanismos de funcionamento dos ambientes digitais potencializam o sofrimento psíquico. O documentário O Dilema das Redes revela que os sistemas são deliberadamente projetados para maximizar o tempo de uso, recorrendo a estímulos semelhantes aos de jogos de azar. Dessa forma, o usuário é exposto a um ciclo de recompensa imediata que, a longo prazo, fragiliza sua capacidade de concentração e altera padrões de sono.

    Portanto, medidas são urgentes para mitigar os impactos da tecnologia sobre o bem-estar contemporâneo. Cabe ao Ministério da Educação, em parceria com as secretarias estaduais de ensino, implementar nas escolas de Ensino Médio um programa permanente de letramento digital e emocional, por meio de oficinas quinzenais conduzidas por psicólogos e professores capacitados. Complementarmente, o Congresso Nacional deve regulamentar o uso de tecnologias digitais por menores de idade.

  gabarito:
    c1: 200
    c2: 40
    c3: 160
    c4: 200
    c5: 200
    total: 800

  aplicacao_da_rubrica:
    c2: |
      Palavras-chave do tema: "redes sociais", "saúde mental", "jovens".
      Parágrafo 1: "tecnologia", "novas gerações" — não cita as palavras-chave.
      Parágrafo 2: "tecnologia", "ambientes digitais", "adolescentes" — parcialmente.
      Parágrafo 3: "ambientes digitais", "usuário" — genérico.
      Parágrafo 4: "tecnologia", "menores de idade" — genérico.
