# ============================================================
# REDATO — GOLDEN SET V2 DE CALIBRAÇÃO
# ============================================================
# Base: rubrica v2 (PDF da corretora-parceira + correção Tensão 3).
# 11 canários sobre "Impactos das redes sociais na saúde mental dos jovens"
# com gabaritos recalibrados pelas regras do PDF.
# ============================================================

metadata:
  version: "2.0"
  base_rubric: "rubrica_v2.md"
  theme: "Impactos das redes sociais na saúde mental dos jovens"
  theme_keywords: ["redes sociais", "saúde mental", "jovens", "juventude"]
  theme_keyword_synonyms:
    "redes sociais": ["mídias sociais", "plataformas digitais", "Instagram", "TikTok", "aplicativos"]
    "saúde mental": ["bem-estar psíquico", "adoecimento psíquico", "sofrimento psíquico", "ansiedade", "depressão"]
    "jovens": ["juventude", "adolescentes", "estudantes", "geração Z"]
  tolerance_per_competency: 40
  deploy_block_threshold: 2

canarios:

# ============================================================
# CANÁRIO 1 — C1 com desvios frequentes e diversificados
# ============================================================
- id: c1_frequent_diverse_errors
  function: "Testa se a LLM aplica corretamente os thresholds numéricos de C1. Com 11 desvios (7 graves + 4 médios), a nota pelo PDF é 40 (nível 1: 'diversificados e frequentes')."
  bias_detected: "Inflação de C1. LLM tende a perdoar desvios gramaticais quando outras competências são fortes."
  essay: |
    A vitrine do sofrimento: redes sociais e a juventude

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo transforma-se em algoz de si mesmo. Esse diagnóstico se aplica as redes sociais, onde os jovens brasileiro expõe suas vidas diariamente. Nesse sentido, o uso massivo dessas plataformas tem comprometido a saúde mental da juventude, seja pela distorção da autoimagem, seja pelo adoecimento provocado por algoritmos.

    Em primeira análise, as redes sociais consolidaram uma cultura de comparação permanente. Isso por que plataformas como Instagram e TikTok priorizam conteúdos estéticos, em que corpos editados e rotinas idealizadas tornam-se parâmetro de normalidade. Como resultado, adolescentes em processo de construção identitária passam a medir seu valor pela métrica de curtidas, fenômeno que o sociólogo Zygmunt Bauman chamou de "modernidade líquida". Pesquisas da OMS apontam crescimento expressivo de quadros de ansiedade entre os jovem na última década, coincidindo com a popularização dessas mídias. Tipo assim, a gente vê isso claramente no dia a dia escolar.

    Ademais, os próprios mecanismos de funcionamento das redes potencializa o sofrimento psíquico. O documentário O Dilema das Redes revela que os algoritmos são projetados para maximizar o tempo de tela, recorrendo à estímulos semelhantes aos de jogos de azar. Dessa forma, o jovem usuário é exposto à um ciclo de recompensa imediata que, à longo prazo, fragiliza sua capacidade de concentração. Tal realidade mau respeita o artigo 227 da Constituição Federal, o qual assegura à infância e à juventude prioridade absoluta na proteção contra toda forma de negligência.

    Portanto, medidas são urgentes para mitigar esses impactos. Cabe ao Ministério da Educação, em parceria com as secretarias estaduais, implementar nas escolas um programa permanente de letramento digital, por meio de oficinas quinzenais conduzidas por psicólogos, com o objetivo de desenvolver o uso crítico das plataformas. Complementarmente, o Congresso Nacional deve regulamentar os algoritmos voltados pra menores de idade, exigindo transparência das empresas de tecnologia, a fim de romper o ciclo entre lucro digital e adoecimento juvenil.

  gabarito:
    c1: 40
    c2: 200
    c3: 200
    c4: 200
    c5: 200
    total: 840

  aplicacao_da_rubrica:
    c1: |
      11 desvios totais (7 gramaticais graves + 4 médios).
      PDF nota 5: máx. 2 desvios → reprovado.
      PDF nota 4: até 3 desvios → reprovado.
      PDF nota 3: até 5 desvios → reprovado.
      PDF nota 2: "estrutura sintática deficitária OU regular + muitos desvios" → limítrofe.
      PDF nota 1: "diversificados e frequentes desvios" → ENQUADRA.
      Nota: 40.
    c2: |
      Repertório produtivo e legitimado: Han (filósofo), Bauman (sociólogo), OMS (dado), O Dilema das Redes (documentário), art. 227 CF (jurídico).
      Repertório no D1 e D2: sim.
      Fontes citadas: sim.
      Palavras-chave em todos os parágrafos: "redes sociais" + "saúde mental" + "jovens/juventude" presentes em todos os parágrafos ou por sinônimos.
      3 partes completas, nenhuma embrionária.
      Nota: 200.
    c5: |
      Agente: Ministério da Educação + Congresso Nacional (2 agentes, ambos presentes).
      Ação: implementar programa / regulamentar algoritmos.
      Modo/Meio: oficinas quinzenais / exigindo transparência.
      Finalidade: desenvolver uso crítico / romper ciclo lucro-adoecimento.
      Detalhamento: "conduzidas por psicólogos" (detalha ação/meio) + "exigindo transparência das empresas" (detalha meio).
      5 elementos presentes. Nota: 200.

  priorizacao_esperada:
    prioridade_1:
      target_competency: c1
      expected_gain: "40 → 200 (até +160 pontos)"
      acoes_obrigatorias:
        - "Listar os 7 desvios graves e os 4 médios explicitamente"
        - "Fornecer correção concreta para cada um"

  structural_checks:
    - kind: c1_desvios_gramaticais_count_min
      value: 8
    - kind: c1_nota_exact
      value: 40
    - kind: priority_1_target
      value: c1

# ============================================================
# CANÁRIO 2 — Repertório falso + abordagem completa
# ============================================================
- id: c2_false_repertoire
  function: "Testa se a LLM detecta repertório não legitimado (citação apócrifa, dado sem fonte, artigo errado). Pelo PDF: repertório não legitimado com abordagem completa = nota 3, não 2."
  bias_detected: "Aceitação de 'forma de repertório' como repertório legítimo."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Desde os primórdios da humanidade, as relações sociais sempre foram importantes para o ser humano. Na atualidade, com o avanço da tecnologia, essas relações passaram a ocorrer majoritariamente no ambiente virtual, o que trouxe consequências graves. Nesse sentido, o uso massivo das redes sociais tem comprometido a saúde mental da juventude, seja pela distorção da autoimagem, seja pelo adoecimento provocado pelo uso excessivo.

    Em primeira análise, cumpre destacar que as redes sociais consolidaram uma cultura da comparação permanente. Isso porque plataformas como Instagram e TikTok priorizam conteúdos estéticos e performáticos, em que corpos editados, rotinas idealizadas e conquistas exibidas tornam-se parâmetro de normalidade. Como resultado, adolescentes em pleno processo de construção identitária passam a medir seu valor pela métrica de curtidas e seguidores. Einstein já dizia que "a tecnologia superou nossa humanidade", e é exatamente isso que observamos hoje. Segundo pesquisas recentes, a maioria dos jovens apresenta algum nível de ansiedade relacionado ao uso dessas plataformas.

    Ademais, é preciso considerar que os próprios mecanismos de funcionamento das redes potencializam o sofrimento psíquico. Os algoritmos são projetados para maximizar o tempo de tela, recorrendo a estímulos que viciam o usuário. Dessa forma, o jovem é exposto a um ciclo de recompensa imediata que, a longo prazo, fragiliza sua capacidade de concentração, altera padrões de sono e intensifica sentimentos de solidão. O artigo 5º da Constituição Federal, que trata da proteção à infância, é claramente desrespeitado nesse contexto, já que os jovens não têm sua saúde mental garantida. Filósofos antigos já discutiam a importância do equilíbrio emocional, algo que se perdeu na era digital.

    Portanto, medidas são urgentes para mitigar os impactos das redes sociais sobre a saúde mental da juventude. Cabe ao Ministério da Educação, em parceria com as secretarias estaduais de ensino, implementar nas escolas de Ensino Médio um programa permanente de letramento digital e emocional, por meio de oficinas quinzenais conduzidas por psicólogos e professores capacitados, com o objetivo de desenvolver o uso crítico das plataformas. Complementarmente, o Congresso Nacional deve regulamentar os algoritmos voltados a menores de idade, a fim de romper o ciclo entre lucro digital e adoecimento juvenil.

  gabarito:
    c1: 200
    c2: 120
    c3: 160
    c4: 200
    c5: 200
    total: 880

  aplicacao_da_rubrica:
    c2: |
      Abordagem completa: sim (3 partes completas).
      Repertório apresentado: Einstein (FALSO — apócrifo), "pesquisas recentes" (NÃO LEGITIMADO — sem fonte), art. 5º CF (LEGITIMADO MAS NÃO PERTINENTE — o correto é 227), "filósofos antigos" (NÃO LEGITIMADO — menção vaga).
      PDF nota 3: "abordagem completa + repertório não legitimado/não pertinente" → ENQUADRA PERFEITAMENTE.
      Nota: 120.
    c3: |
      Informações relacionadas ao tema, organizadas.
      Indícios de autoria: baixos (argumentação apoiada em referências falsas e menções vagas).
      Argumentação previsível.
      Nota 4 por organização clara, mas autoria fraca puxa para 4.
      Nota: 160.

  problemas_c2_listados:
    repertorio_falso:
      - quote: "Einstein já dizia que 'a tecnologia superou nossa humanidade'"
        reason: "Citação apócrifa. Não há registro de Einstein ter dito ou escrito essa frase."
    repertorio_nao_legitimado:
      - quote: "Segundo pesquisas recentes, a maioria dos jovens..."
        reason: "Dado sem fonte específica — 'pesquisas recentes' é genérico demais."
      - quote: "Filósofos antigos já discutiam..."
        reason: "Menção vaga sem nomear autor ou obra."
    repertorio_nao_pertinente:
      - quote: "artigo 5º da Constituição Federal, que trata da proteção à infância"
        reason: "Artigo incorreto. A proteção à infância está no art. 227, não no 5º."

  structural_checks:
    - kind: c2_has_false_attribution_ref
      value: true
    - kind: c2_has_not_legitimated_ref
      value: true
    - kind: c2_nota_exact
      value: 120

# ============================================================
# CANÁRIO 3 — Sem tese, justaposição temática
# ============================================================
- id: c3_no_project
  function: "Testa detecção de ausência de projeto de texto. Pelo PDF: sem ponto de vista claro + argumentos desorganizados = C3 nota 1 ou 2."
  bias_detected: "Aceitação de sucessão temática como projeto argumentativo."
  essay: |
    A vitrine do sofrimento: redes sociais e a saúde mental da juventude

    Na obra Sociedade do Cansaço, o filósofo sul-coreano Byung-Chul Han argumenta que o sujeito contemporâneo transforma-se em algoz de si mesmo. As redes sociais são um fenômeno complexo da contemporaneidade e afetam os jovens de muitas formas diferentes. É importante discutir esse tema.

    As redes sociais possuem muitos pontos positivos, como facilitar a comunicação entre pessoas distantes e permitir o acesso à informação. Muitos jovens conseguem se conectar com amigos, descobrir novos interesses e até mesmo encontrar oportunidades de trabalho por meio dessas plataformas. O sociólogo Zygmunt Bauman, em Modernidade Líquida, já discutia a fragilidade dos vínculos contemporâneos. Por outro lado, o uso excessivo pode gerar problemas. A ansiedade tem aumentado entre os jovens, segundo a OMS. Isso é preocupante. O documentário O Dilema das Redes mostra como os algoritmos funcionam.

    O cyberbullying também é um problema sério nas redes sociais. Muitos jovens sofrem com ataques virtuais e isso afeta sua autoestima. Além disso, existe a questão da privacidade, já que as plataformas coletam dados pessoais dos usuários. O artigo 227 da Constituição garante direitos às crianças e adolescentes. A dependência digital também é preocupante e pode levar ao isolamento social. Alguns jovens passam mais de oito horas por dia conectados.

    Portanto, medidas são urgentes. Cabe ao Ministério da Educação, em parceria com as secretarias estaduais de ensino, implementar nas escolas de Ensino Médio um programa permanente de letramento digital e emocional, por meio de oficinas quinzenais conduzidas por psicólogos e professores capacitados, com o objetivo de desenvolver o uso crítico das plataformas e fortalecer o bem-estar psíquico dos estudantes. Complementarmente, o Congresso Nacional deve regulamentar os algoritmos voltados a menores de idade, exigindo transparência das empresas de tecnologia, a fim de romper o ciclo entre lucro digital e adoecimento juvenil.

  gabarito:
    c1: 200
    c2: 160
    c3: 80
    c4: 160
    c5: 200
    total: 800

  aplicacao_da_rubrica:
    c3: |
      Sem ponto de vista claro (introdução não se posiciona).
      D1 contraditório (elogia redes, depois critica).
      D2 justaposição sem ordenação (cyberbullying + privacidade + dependência como tópicos soltos).
      Ideias mal conectadas.
      Argumentos inconsistentes/contraditórios (positivos vs. negativos sem síntese).
      PDF nota 2: "informações desorganizadas ou contraditórias, limitadas aos motivadores, ideias mal conectadas, argumentos inconsistentes" → ENQUADRA.
      Nota: 80.
    c2: |
      Repertório legitimado (Han, Bauman, OMS, documentário, art. 227) mas decorativo (sem articulação argumentativa).
      Abordagem completa, 3 partes não embrionárias.
      Repertório "legitimado mas não bem articulado" puxa para nota 3 (120) ou 4 (160).
      Nota: 160 por generosidade com as fontes citadas.

  structural_checks:
    - kind: c3_has_explicit_thesis
      value: false
    - kind: c3_argumentos_contraditorios
      value: true
    - kind: c3_nota_max
      value: 120

