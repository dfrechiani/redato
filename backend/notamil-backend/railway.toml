# Railway config — backend (portal + bot unificados).
#
# Builder = DOCKERFILE: usamos `Dockerfile` manual porque Nixpacks/
# Railpack tinham problemas reproduzíveis pra fazer bootstrap do pip
# em derivações Nix do Python. Dockerfile é determinístico —
# `python:3.12-slim` já traz pip funcional.
#
# `nixpacks.toml` e `railpack.json` ficam no repo só pra referência
# histórica do que foi tentado. Não são lidos quando builder=DOCKERFILE.
#
# Railway lê este `railway.toml` do diretório apontado como
# "Root Directory" do serviço (`backend/notamil-backend`).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# `startCommand` é executado pelo Railway runtime SEM wrapping de
# shell — variáveis tipo `$PORT` chegam literais pro processo. Por
# isso a versão antiga (sem `sh -c`) quebrava com:
#   Error: Invalid value for '--port': '$PORT' is not a valid integer.
#
# Soluções:
#  (a) usar `sh -c "..."` aqui — força shell pra expandir;
#  (b) remover a linha e deixar Railway usar o `CMD` do Dockerfile.
#
# Ficamos com (a) pra manter `railway.toml` como fonte única de
# verdade do startup. Se um dia mudar pra (b), remova a linha
# `startCommand` inteira — o `CMD` do Dockerfile já chama `sh -c`.
startCommand = "sh -c 'uvicorn redato_backend.unified_app:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/admin/health/full"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
